<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Котостудия</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="header">
      <div class="container">
        <nav class="navbar navbar-expand-lg p-0">
          <a class="navbar-brand logo" href="#">Котостудия</a>

          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#menu"
          >
            <span class="navbar-toggler-icon"></span>
          </button>

          <div class="collapse navbar-collapse justify-content-end" id="menu">
            <ul class="navbar-nav">
              <li class="nav-item">
                <a class="nav-link menu-link" href="#about">О нас</a>
              </li>
              <li class="nav-item">
                <a class="nav-link menu-link" href="#gallery">Галерея</a>
              </li>
              <li class="nav-item">
                <a class="nav-link menu-link" href="#form">Записаться</a>
              </li>
            </ul>
          </div>
        </nav>
      </div>
    </header>

    <section class="about" id="about">
      <div class="container text-center">
        <h1 class="title">Мы фотографируем котиков</h1>
        <p class="about-text">
          Добро пожаловать в «Котостудию» — место, где пушистики становятся
          настоящими моделями.
        </p>
      </div>
    </section>

    <section class="gallery" id="gallery">
      <div class="container">
        <h2 class="title text-center">Галерея</h2>

        <div class="row">
          <div class="col-md-4 mb-4">
            <div class="cat-card">
              <img
                src="https://images.unsplash.com/photo-1519052537078-e6302a4968d4?auto=format&fit=crop&w=800&q=80"
                alt="Котик 1"
                class="cat-img"
              />
            </div>
          </div>

          <div class="col-md-4 mb-4">
            <div class="cat-card">
              <img
                src="https://images.unsplash.com/photo-1574158622682-e40e69881006?auto=format&fit=crop&w=800&q=80"
                alt="Котик 2"
                class="cat-img"
              />
            </div>
          </div>

          <div class="col-md-4 mb-4">
            <div class="cat-card">
              <img
                src="https://images.unsplash.com/photo-1495360010541-f48722b34f7d?auto=format&fit=crop&w=800&q=80"
                alt="Котик 3"
                class="cat-img"
              />
            </div>
          </div>
        </div>
      </div>
    </section>

    <section class="form-section" id="form">
      <div class="container">
        <h2 class="title text-center">Записаться на фотосессию</h2>

        <form>
          <div class="mb-3">
            <label for="name" class="form-label">Имя:</label>
            <input type="text" class="form-control" id="name" />
          </div>

          <div class="mb-3">
            <label for="email" class="form-label">Email:</label>
            <input type="email" class="form-control" id="email" />
          </div>

          <div class="mb-3">
            <label for="cat-name" class="form-label">Имя котика:</label>
            <input type="text" class="form-control" id="cat-name" />
          </div>

          <button type="submit" class="btn btn-primary">Записаться</button>
        </form>
      </div>
    </section>

    <footer class="footer">
      <div class="container text-center">
        <p>© 2025 Котостудия. Мурчим с любовью 🐾</p>
      </div>
    </footer>
  </body>
</html>
